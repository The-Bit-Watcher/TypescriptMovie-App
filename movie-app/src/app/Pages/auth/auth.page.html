<ion-content class="auth-content" fullscreen>

  <div class="brand-area">
    <h1 class="brand-name">FilmLog</h1>
    <p class="brand-tagline">Track what you watch.</p>
  </div>

  <div class="auth-card">
    <h2 class="form-title">{{ isLoginMode ? 'Welcome back' : 'Create account' }}</h2>

    <ion-item *ngIf="!isLoginMode" lines="none" class="input-item">
      <ion-input
        label="Username"
        label-placement="floating"
        type="text"
        [(ngModel)]="username"
        placeholder="Your display name"
        autocomplete="username">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="input-item">
      <ion-input
        label="Email"
        label-placement="floating"
        type="email"
        [(ngModel)]="email"
        placeholder="you@email.com"
        autocomplete="email">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="input-item">
      <ion-input
        label="Password"
        label-placement="floating"
        [type]="showPassword ? 'text' : 'password'"
        [(ngModel)]="password"
        placeholder="••••••••"
        autocomplete="current-password">
      </ion-input>
      <ion-button fill="clear" slot="end" (click)="showPassword = !showPassword">
        <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
      </ion-button>
    </ion-item>

    <ion-item *ngIf="!isLoginMode" lines="none" class="input-item">
      <ion-input
        label="Age (optional)"
        label-placement="floating"
        type="number"
        [(ngModel)]="age"
        placeholder="18">
      </ion-input>
    </ion-item>

    <ion-button
      expand="block"
      class="submit-btn"
      (click)="onSubmit()">
      {{ isLoginMode ? 'Log In' : 'Sign Up' }}
    </ion-button>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="toggle-area">
      <p>{{ isLoginMode ? "Don't have an account?" : 'Already have an account?' }}</p>
      <ion-button fill="clear" class="toggle-btn" (click)="toggleMode()">
        {{ isLoginMode ? 'Sign Up' : 'Log In' }}
      </ion-button>
    </div>

  </div>

</ion-content>
